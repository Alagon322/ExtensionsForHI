<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Открыть Loggia</title>
  <link rel="stylesheet" type="text/css" href="popup.css" />
</head>
<body>
  <main class="app">
    <header class="app-header">
      <div>
        <h1>HandInfo → Loggia</h1>
        <p class="subtitle">Открывай тренерские, мозговые и служебные логи из HI</p>
      </div>
    </header>

    <section class="cards-grid">
      <section class="card">
        <div class="card-head">
          <h2>Тренерские</h2>
        </div>
        <div class="button-group">
          <button id="grabBtn">Headless</button>
          <button id="grabBtn2">Hint</button>
        </div>
      </section>

      <section class="card">
        <div class="card-head">
          <h2>Мозговые</h2>
        </div>
        <div class="button-group">
          <button id="grabBtn3">Лог раздачи</button>
          <button id="grabBtn4">Открытие стола</button>
          <button id="grabBtn5">Открытие сессии</button>
          <button id="grabBtn6">Лог импорта</button>
          <button id="grabBtn7">Лог error import</button>
        </div>
      </section>

      <section class="card">
        <div class="card-head">
          <h2>Доп. функции</h2>
        </div>
        <div class="button-group">
          <button id="grabBtn8" class="copy-button">Скопировать Ingame Orlog</button>
          <button id="grabBtn9">Сборка AXON</button>
          <button id="grabBtn10" class="copy-button">Скопировать GIP2</button>
        </div>
      </section>
    </section>
  </main>

  <script src="popup.js"></script>
</body>
</html>
